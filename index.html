<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Button Page</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .button {
            display: inline-block;
            padding: 20px 40px;
            margin: 15px;
            font-size: 24px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.3s ease, background-color 0.3s ease;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }
        .button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <a href="dictionary.html" class="button" target="_blank">Dictionary</a>
    <a href="gk.html" class="button" target="_blank">General Knowledge</a>
    <a href="notepad.html" class="button" target="_blank">Notepad</a>
</body>
</html>
